<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div id="screen-setup" class="screen active">
        <h1>Impostor Setup</h1>
        
        <div class="form-group">
            <label>Topics</label>
            <div class="checkbox-group" id="topic-container"></div>
        </div>
        
        <div class="form-group">
            <label>Game Settings</label>
            <div class="mode-section">
                <label class="normal-label">
                    <input type="checkbox" id="alt-mode"> Alternate Word Mode
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Players Management</label>
            <div class="player-ui-box">
                <div class="player- put-row">
                    <input type="text" id="new-player-name" placeholder="Enter player name">
                    <button type="button" class="btn-add" onclick="addPlayerFromUI()">Add</button>
                </div>
                <ul id="player-list-registry" class="player-list"></ul>
            </div>
        </div>

        <div class="form-group">
            <label>Number of Impostors</label>
            <div class="player-input-row">
                <input type="number" id="impostor-count" value="1" min="0" inputmode="none">
                <div class="player-controls" style="display: flex; gap: 4px;">
                    <button type="button" class="btn-ctrl" onclick="adjustImpostorCount(-1)">▼</button>
                    <button type="button" class="btn-ctrl" onclick="adjustImpostorCount(1)">▲</button>
                </div>
            </div>
        </div>
        <button onclick="startGame()" class="btn-main">Generate Game</button>
    </div>

    <div id="screen-pass" class="screen">
        <div class="top-bar">
            <button class="btn-ctrl btn-delete btn-end-game" onclick="resetGame()">End Game</button>
        </div>
        <h2 id="pass-instruction">Pass the phone to...</h2>
        <h1 id="current-player-name">PLAYER</h1>
        <button id="btn-reveal-hold" class="btn-main" onclick="toggleSecretVisibility()">Show My Word</button>
        <div id="secret-area" style="display: none;">
            <div class="secret-box" id="secret-word">WORD</div>
            <button class="btn-main" onclick="nextPlayer()">Next Player</button>
        </div>
    </div>

    <div id="screen-gameplay" class="screen">
        <div class="top-bar">
            <button class="btn-ctrl btn-delete btn-end-game" onclick="resetGame()">End Game</button>
        </div>
        <h1>Game in Progress</h1>
        <button onclick="showResults()" class="btn-main btn-success">End Game & Reveal</button>
    </div>

    <div id="screen-results" class="screen">
        <h1>Results</h1>
        <div id="word-reveal-summary" class="summary-text"></div>
        <div id="alt-word-reveal-summary" class="summary-text alt-color"></div>
        <table>
            <thead>
                <tr><th>Player</th><th>Role</th><th>Assigned Word</th></tr>
            </thead>
            <tbody id="results-table-body"></tbody>
        </table>
        <button onclick="resetGame()" class="btn-main">Play Again</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
